<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCAL FARTS — Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; scrollbar-width:thin; scrollbar-color:#333 transparent; }
    ::selection { background:#f97316; color:#000; }
    body { background:#080808; color:#ccc; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .mono { font-family:'JetBrains Mono',monospace; }
    input, button { font-family: inherit; }
    input:focus { outline: none; border-color: #f97316 !important; }
    button { cursor: pointer; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 3s linear infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ========================================================================
    // CONFIG
    // ========================================================================
    const API_BASE = "/api";
    let API_TOKEN = localStorage.getItem("radio_admin_token") || "";

    // ========================================================================
    // API HELPER
    // ========================================================================
    async function api(path, opts = {}) {
      const res = await fetch(API_BASE + path, {
        ...opts,
        headers: {
          "Content-Type": "application/json",
          "X-Admin-Token": API_TOKEN,
          ...(opts.headers || {}),
        },
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      if (res.status === 401) throw new Error("AUTH");
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || res.statusText);
      }
      return res.json();
    }

    // ========================================================================
    // ICONS
    // ========================================================================
    const I = {
      Radio: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"/><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.4"/><circle cx="12" cy="12" r="2"/><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.4"/><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"/></svg>,
      Users: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>,
      Music: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>,
      Clock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Skip: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>,
      Headphones: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>,
      Terminal: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>,
      Shield: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
      X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>,
      Search: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      Plus: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Refresh: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>,
      Play: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>,
    };

    function StatusDot({active}) {
      return <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:active?'#22c55e':'#ef4444',boxShadow:active?'0 0 8px #22c55e80':'0 0 8px #ef444480'}} />;
    }

    // ========================================================================
    // LOGIN SCREEN
    // ========================================================================
    function LoginScreen({onLogin}) {
      const [token, setToken] = useState("");
      const [err, setErr] = useState("");
      const tryLogin = async () => {
        API_TOKEN = token;
        try {
          await api("/status");
          localStorage.setItem("radio_admin_token", token);
          onLogin();
        } catch(e) {
          setErr("Неверный токен");
        }
      };
      return (
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh'}}>
          <div style={{background:'#111',border:'1px solid #222',borderRadius:16,padding:32,width:360}} className="fade-in">
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:24}}>
              <div style={{width:40,height:40,borderRadius:10,background:'linear-gradient(135deg,#f97316,#c2410c)',display:'flex',alignItems:'center',justifyContent:'center'}}><I.Radio/></div>
              <div><div style={{fontWeight:700,color:'#fafafa'}}>LOCAL FARTS</div><div style={{fontSize:12,color:'#555'}}>Admin Panel</div></div>
            </div>
            <label style={{fontSize:12,color:'#666',display:'block',marginBottom:4}}>API Token</label>
            <input value={token} onChange={e=>{setToken(e.target.value);setErr("")}} onKeyDown={e=>e.key==='Enter'&&tryLogin()}
              style={{width:'100%',padding:'10px 14px',borderRadius:10,background:'#0a0a0a',color:'#eee',border:'1px solid #222',fontSize:14,fontFamily:'JetBrains Mono,monospace'}}
              placeholder="Вставь токен..." type="password" autoFocus />
            {err && <div style={{color:'#ef4444',fontSize:12,marginTop:6}}>{err}</div>}
            <button onClick={tryLogin} style={{width:'100%',marginTop:12,padding:'10px 0',borderRadius:10,background:'#f97316',color:'#000',fontWeight:600,fontSize:14,border:'none'}}>Войти</button>
          </div>
        </div>
      );
    }

    // ========================================================================
    // NAV
    // ========================================================================
    function Nav({active, onChange}) {
      const tabs = [
        {id:"dashboard",label:"Дашборд",icon:<I.Radio/>},
        {id:"djs",label:"Диджеи",icon:<I.Headphones/>},
        {id:"library",label:"Библиотека",icon:<I.Music/>},
        {id:"history",label:"История",icon:<I.Clock/>},
        {id:"logs",label:"Логи",icon:<I.Terminal/>},
      ];
      return (
        <div style={{display:'flex',gap:4,padding:4,borderRadius:12,background:'#111'}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>onChange(t.id)} style={{
              display:'flex',alignItems:'center',gap:8,padding:'10px 16px',borderRadius:8,fontSize:14,fontWeight:500,border:'none',
              background:active===t.id?'#1f1f1f':'transparent',
              color:active===t.id?'#f97316':'#666',
              borderWidth:1,borderStyle:'solid',borderColor:active===t.id?'#2a2a2a':'transparent',
              transition:'all 0.2s',
            }}>{t.icon}<span className="nav-label">{t.label}</span></button>
          ))}
        </div>
      );
    }

    // ========================================================================
    // DASHBOARD
    // ========================================================================
    function Dashboard() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);

      const load = useCallback(async () => {
        try {
          const status = await api("/status");
          setData(status);
        } catch(e) { console.error(e); }
        setLoading(false);
      }, []);

      useEffect(() => { load(); const iv = setInterval(load, 5000); return ()=>clearInterval(iv); }, [load]);

      if (loading) return <div style={{textAlign:'center',padding:40,color:'#555'}}>Загрузка...</div>;
      if (!data) return <div style={{textAlign:'center',padding:40,color:'#ef4444'}}>Ошибка загрузки</div>;

      const np = data.now_playing || {};
      const svcs = data.services || {};

      return (
        <div style={{display:'flex',flexDirection:'column',gap:16}} className="fade-in">
          {/* Now Playing */}
          <div style={{background:'linear-gradient(135deg,#1a1000 0%,#0d0d0d 50%,#0a0a0a 100%)',border:'1px solid #2a2200',borderRadius:16,padding:24}}>
            <div style={{display:'flex',alignItems:'start',gap:20}}>
              <div style={{width:56,height:56,borderRadius:12,background:'linear-gradient(135deg,#f97316,#c2410c)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><I.Play/></div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:6,padding:'2px 8px',borderRadius:4,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,background:'#f97316',color:'#000'}}>
                    <span className="pulse-dot" style={{width:6,height:6,borderRadius:'50%',background:'#000'}} /> В ЭФИРЕ
                  </span>
                  {data.live_dj
                    ? <span style={{fontSize:12,padding:'2px 8px',borderRadius:4,background:'#7c3aed33',color:'#a78bfa',border:'1px solid #7c3aed55'}}>🎧 {data.live_dj.name}</span>
                    : <span style={{fontSize:12,color:'#666'}}>AUTODJ</span>
                  }
                </div>
                <div style={{fontSize:20,fontWeight:700,color:'#fafafa',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{np.title || "—"}</div>
                <div style={{fontSize:15,color:'#999',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{np.artist || "—"}</div>
                {np.genre && <span style={{display:'inline-block',marginTop:4,fontSize:11,padding:'2px 8px',borderRadius:4,background:'#ffffff08',color:'#888'}}>{np.genre}</span>}
              </div>
              <button onClick={async()=>{await api("/skip",{method:"POST"});load()}}
                style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',borderRadius:8,fontSize:13,fontWeight:500,background:'#1f1f1f',color:'#f97316',border:'1px solid #333'}}>
                <I.Skip/> Skip
              </button>
            </div>
          </div>

          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {[
              {label:"Слушатели",value:(data.listeners.total||0)+" ("+((data.listeners.hls||0))+" HLS + "+(data.listeners.icecast||0)+" ICE)",color:"#22c55e",icon:"👂"},
              {label:"Аптайм",value:data.uptime,color:"#38bdf8",icon:"⚡"},
              {label:"Live DJ",value:data.live_dj?data.live_dj.name:"—",color:"#a78bfa",icon:"🎧"},
              {label:"Сервисы",value:Object.values(svcs).filter(s=>s==="active").length+"/"+Object.keys(svcs).length,color:"#22c55e",icon:"🛡️"},
            ].map((s,i)=>(
              <div key={i} style={{background:'#111',border:'1px solid #1a1a1a',borderRadius:12,padding:16}}>
                <div style={{fontSize:20,marginBottom:4}}>{s.icon}</div>
                <div className="mono" style={{fontSize:22,fontWeight:700,color:s.color}}>{s.value}</div>
                <div style={{fontSize:11,color:'#555',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Services */}
          <div style={{background:'#111',border:'1px solid #1a1a1a',borderRadius:12,padding:20}}>
            <div style={{fontSize:13,fontWeight:600,color:'#888',marginBottom:12,display:'flex',alignItems:'center',gap:8}}><I.Shield/> СЕРВИСЫ</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
              {Object.entries(svcs).map(([name,status])=>(
                <div key={name} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,background:'#0a0a0a'}}>
                  <StatusDot active={status==="active"}/>
                  <div>
                    <div style={{fontSize:13,fontWeight:500,color:'#ccc'}}>{name}</div>
                    <div className="mono" style={{fontSize:11,color:status==='active'?'#22c55e':'#ef4444'}}>{status}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ========================================================================
    // DJS
    // ========================================================================
    function DJs() {
      const [djs, setDjs] = useState([]);
      const [showAdd, setShowAdd] = useState(false);
      const [form, setForm] = useState({user:"",name:"",password:"",max_minutes:60});
      const [editUser, setEditUser] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [msg, setMsg] = useState("");

      const load = useCallback(async()=>{
        try { setDjs(await api("/djs")); } catch(e){}
      },[]);
      useEffect(()=>{load()},[load]);

      const addDj = async()=>{
        try {
          await api("/djs",{method:"POST",body:form});
          setForm({user:"",name:"",password:"",max_minutes:60});
          setShowAdd(false);
          load();
          flash("DJ добавлен ✅");
        } catch(e) { flash("Ошибка: "+e.message); }
      };

      const startEdit = (dj)=>{
        setEditUser(dj.user);
        setEditForm({name:dj.name, max_minutes:dj.max_minutes, password:""});
      };

      const cancelEdit = ()=>{ setEditUser(null); setEditForm({}); };

      const saveEdit = async()=>{
        try {
          const body = { name: editForm.name, max_minutes: editForm.max_minutes };
          if (editForm.password) body.password = editForm.password;
          await api(`/djs/${editUser}`,{method:"PUT",body});
          cancelEdit();
          load();
          flash("Сохранено ✅");
        } catch(e) { flash("Ошибка: "+e.message); }
      };

      const toggleDj = async(user,enabled)=>{
        await api(`/djs/${user}`,{method:"PUT",body:{enabled:!enabled}});
        load();
      };

      const removeDj = async(user)=>{
        if(!confirm(`Удалить ${user}?`)) return;
        await api(`/djs/${user}`,{method:"DELETE"});
        if(editUser===user) cancelEdit();
        load();
      };

      const kick = async()=>{
        await api("/djs/kick",{method:"POST"});
        flash("DJ кикнут ✅");
      };

      const flash = (t)=>{ setMsg(t); setTimeout(()=>setMsg(""),3000); };

      const inputStyle = {width:'100%',padding:'8px 12px',borderRadius:8,fontSize:13,background:'#0a0a0a',color:'#eee',border:'1px solid #222'};
      const labelStyle = {fontSize:11,color:'#666',display:'block',marginBottom:4};

      return (
        <div style={{display:'flex',flexDirection:'column',gap:12}} className="fade-in">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <h2 style={{fontSize:18,fontWeight:700,color:'#ddd'}}>Диджеи</h2>
            <div style={{display:'flex',gap:8}}>
              <button onClick={kick} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:8,fontSize:13,fontWeight:500,background:'#7c3aed22',color:'#a78bfa',border:'1px solid #7c3aed44'}}>🔌 Kick Live</button>
              <button onClick={()=>{setShowAdd(!showAdd);cancelEdit();}} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:8,fontSize:13,fontWeight:600,background:'#f97316',color:'#000',border:'none'}}>
                <I.Plus/> Добавить
              </button>
            </div>
          </div>
          {msg && <div style={{padding:'8px 12px',borderRadius:8,fontSize:13,background:'#22c55e15',color:'#22c55e',border:'1px solid #22c55e33'}}>{msg}</div>}

          {showAdd && (
            <div style={{background:'#111',border:'1px solid #f9731633',borderRadius:12,padding:20}} className="fade-in">
              <div style={{fontSize:13,fontWeight:600,color:'#f97316',marginBottom:12}}>Новый DJ</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                {[
                  {key:"user",label:"Username",ph:"dj_name",type:"text"},
                  {key:"name",label:"Имя",ph:"DJ Имя",type:"text"},
                  {key:"password",label:"Пароль",ph:"мин. 8 символов",type:"password"},
                  {key:"max_minutes",label:"Лимит (мин)",ph:"60",type:"number"},
                ].map(f=>(
                  <div key={f.key}>
                    <label style={labelStyle}>{f.label}</label>
                    <input value={form[f.key]} onChange={e=>setForm({...form,[f.key]:f.type==="number"?parseInt(e.target.value)||0:e.target.value})}
                      type={f.type} placeholder={f.ph} style={inputStyle} />
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:8,marginTop:12}}>
                <button onClick={addDj} style={{padding:'8px 20px',borderRadius:8,fontSize:13,fontWeight:600,background:'#22c55e',color:'#000',border:'none'}}>Создать</button>
                <button onClick={()=>setShowAdd(false)} style={{padding:'8px 20px',borderRadius:8,fontSize:13,background:'transparent',color:'#666',border:'1px solid #333'}}>Отмена</button>
              </div>
            </div>
          )}

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {djs.map(dj=>(
              <div key={dj.user} style={{background:'#111',border:editUser===dj.user?'1px solid #f9731644':'1px solid #1a1a1a',borderRadius:12,overflow:'hidden'}}>
                <div style={{padding:16,display:'flex',alignItems:'center',gap:14}}>
                  <div style={{width:40,height:40,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,background:dj.enabled?'#f9731622':'#33333366',color:dj.enabled?'#f97316':'#555',flexShrink:0}}>🎧</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{fontSize:14,fontWeight:600,color:dj.enabled?'#eee':'#555'}}>{dj.name}</span>
                      <span className="mono" style={{fontSize:11,padding:'1px 6px',borderRadius:4,background:'#ffffff06',color:'#555'}}>{dj.user}</span>
                    </div>
                    <div style={{fontSize:11,color:'#555',marginTop:2}}>⏱ {dj.max_minutes>0?dj.max_minutes+" мин":"∞"}</div>
                  </div>
                  <button onClick={()=>editUser===dj.user?cancelEdit():startEdit(dj)} title="Редактировать" style={{
                    padding:'6px 10px',borderRadius:8,fontSize:12,border:'1px solid',
                    background:editUser===dj.user?'#f9731633':'#ffffff08',
                    color:editUser===dj.user?'#f97316':'#666',
                    borderColor:editUser===dj.user?'#f9731644':'#ffffff11',
                  }}>✏️</button>
                  <button onClick={()=>toggleDj(dj.user,dj.enabled)} style={{
                    padding:'6px 12px',borderRadius:8,fontSize:12,fontWeight:500,border:'1px solid',
                    background:dj.enabled?'#22c55e22':'#33333344',
                    color:dj.enabled?'#22c55e':'#666',
                    borderColor:dj.enabled?'#22c55e44':'#33333366',
                  }}>{dj.enabled?"✅ Вкл":"Выкл"}</button>
                  <button onClick={()=>removeDj(dj.user)} style={{padding:'6px 10px',borderRadius:8,fontSize:12,background:'#ef444422',color:'#ef4444',border:'1px solid #ef444444'}}><I.X/></button>
                </div>

                {editUser===dj.user && (
                  <div style={{borderTop:'1px solid #1a1a1a',padding:16,background:'#0c0c0c'}} className="fade-in">
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                      <div>
                        <label style={labelStyle}>Имя</label>
                        <input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} style={inputStyle} />
                      </div>
                      <div>
                        <label style={labelStyle}>Лимит (мин)</label>
                        <input type="number" value={editForm.max_minutes} onChange={e=>setEditForm({...editForm,max_minutes:parseInt(e.target.value)||0})} style={inputStyle} />
                      </div>
                      <div style={{gridColumn:'1/-1'}}>
                        <label style={labelStyle}>Новый пароль <span style={{color:'#444'}}>— оставь пустым чтобы не менять</span></label>
                        <input type="password" value={editForm.password} onChange={e=>setEditForm({...editForm,password:e.target.value})} placeholder="новый пароль" style={inputStyle} />
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,marginTop:12}}>
                      <button onClick={saveEdit} style={{padding:'8px 20px',borderRadius:8,fontSize:13,fontWeight:600,background:'#22c55e',color:'#000',border:'none'}}>Сохранить</button>
                      <button onClick={cancelEdit} style={{padding:'8px 20px',borderRadius:8,fontSize:13,background:'transparent',color:'#666',border:'1px solid #333'}}>Отмена</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
            {djs.length===0 && <div style={{textAlign:'center',padding:32,color:'#444'}}>Нет диджеев. Добавь первого!</div>}
          </div>
        </div>
      );
    }

    // ========================================================================
    // LIBRARY
    // ========================================================================
    function Library() {
      const [data, setData] = useState(null);
      const [search, setSearch] = useState("");
      const [results, setResults] = useState([]);
      const [searching, setSearching] = useState(false);

      useEffect(()=>{
        api("/library").then(setData).catch(()=>{});
      },[]);

      const doSearch = useCallback(async(q)=>{
        if(q.length<2){setResults([]);return;}
        setSearching(true);
        try { setResults(await api(`/library/search?q=${encodeURIComponent(q)}`)); }
        catch(e){}
        setSearching(false);
      },[]);

      useEffect(()=>{
        const t = setTimeout(()=>doSearch(search), 300);
        return ()=>clearTimeout(t);
      },[search,doSearch]);

      const queueTrack = async(path)=>{
        try { await api("/queue",{method:"POST",body:{uri:path}}); }
        catch(e){ alert("Ошибка: "+e.message); }
      };

      if(!data) return <div style={{textAlign:'center',padding:40,color:'#555'}}>Загрузка...</div>;

      const colors = ['#f97316','#22c55e','#3b82f6','#a78bfa','#f43f5e','#eab308','#14b8a6','#ec4899','#6366f1','#f59e0b'];

      return (
        <div style={{display:'flex',flexDirection:'column',gap:14}} className="fade-in">
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <h2 style={{fontSize:18,fontWeight:700,color:'#ddd'}}>Библиотека</h2>
            <span className="mono" style={{fontSize:13,padding:'2px 8px',borderRadius:4,background:'#f9731622',color:'#f97316'}}>{data.total} треков</span>
          </div>

          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#444'}}><I.Search/></span>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Поиск треков..."
              style={{width:'100%',padding:'12px 14px 12px 40px',borderRadius:12,fontSize:14,background:'#111',color:'#eee',border:'1px solid #222'}} />
          </div>

          {/* Search Results */}
          {search.length>=2 && (
            <div style={{background:'#111',border:'1px solid #1a1a1a',borderRadius:12,maxHeight:400,overflowY:'auto'}}>
              {searching && <div style={{padding:16,textAlign:'center',color:'#555'}}>Ищу...</div>}
              {!searching && results.length===0 && <div style={{padding:16,textAlign:'center',color:'#555'}}>Ничего не найдено</div>}
              {results.map((t,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',borderBottom:i<results.length-1?'1px solid #1a1a1a':'none'}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,color:'#eee',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.filename}</div>
                    <div style={{fontSize:11,color:'#444',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.rel_path}</div>
                  </div>
                  <button onClick={()=>queueTrack(t.path)} style={{padding:'4px 10px',borderRadius:6,fontSize:11,background:'#f9731622',color:'#f97316',border:'1px solid #f9731644',whiteSpace:'nowrap'}}>+ В очередь</button>
                </div>
              ))}
            </div>
          )}

          {/* Genres */}
          {search.length<2 && (
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
              {data.genres.map(([name,count],i)=>{
                const pct = (count/data.total)*100;
                const color = colors[i%colors.length];
                return (
                  <div key={name} onClick={()=>setSearch(name)} style={{background:'#111',border:'1px solid #1a1a1a',borderRadius:12,padding:16,cursor:'pointer',position:'relative',overflow:'hidden',transition:'transform 0.15s'}}>
                    <div style={{position:'absolute',bottom:0,left:0,height:3,width:pct+'%',background:color,opacity:0.5,borderRadius:'0 4px 0 0'}} />
                    <div style={{fontSize:13,fontWeight:500,color:'#ddd',marginBottom:4}}>{name}</div>
                    <div className="mono" style={{fontSize:20,fontWeight:700,color}}>{count}</div>
                    <div style={{fontSize:11,color:'#444'}}>{pct.toFixed(1)}%</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ========================================================================
    // HISTORY
    // ========================================================================
    function History() {
      const [history, setHistory] = useState([]);
      useEffect(()=>{ api("/history").then(setHistory).catch(()=>{}); },[]);
      return (
        <div className="fade-in">
          <h2 style={{fontSize:18,fontWeight:700,color:'#ddd',marginBottom:14}}>История эфира</h2>
          <div style={{background:'#111',border:'1px solid #1a1a1a',borderRadius:12,overflow:'hidden'}}>
            {history.length===0 && <div style={{padding:32,textAlign:'center',color:'#555'}}>Нет данных</div>}
            {history.map((t,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:14,padding:'10px 16px',borderBottom:i<history.length-1?'1px solid #1a1a1a':'none'}}>
                <span className="mono" style={{fontSize:11,color:'#444',width:48,flexShrink:0,textAlign:'center'}}>{t.played_at || t.time || "—"}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,color:'#eee',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.title || t.song || "—"}</div>
                  <div style={{fontSize:11,color:'#666'}}>{t.artist || ""}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ========================================================================
    // LOGS
    // ========================================================================
    function Logs() {
      const [logs, setLogs] = useState([]);
      const [autoRefresh, setAutoRefresh] = useState(true);

      const load = useCallback(async()=>{
        try { setLogs(await api("/logs?lines=200")); } catch(e){}
      },[]);

      useEffect(()=>{
        load();
        if(autoRefresh){ const iv = setInterval(load, 10000); return ()=>clearInterval(iv); }
      },[load,autoRefresh]);

      const colorize = (line) => {
        if(line.includes("AUTH-OK")) return "#22c55e";
        if(line.includes("AUTH-FAIL")) return "#ef4444";
        if(line.includes("AUTO-KICK")) return "#f97316";
        if(line.includes("DISCONNECT")) return "#3b82f6";
        if(line.includes("RATE-LIMIT")) return "#eab308";
        return "#555";
      };

      return (
        <div className="fade-in">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
            <h2 style={{fontSize:18,fontWeight:700,color:'#ddd'}}>DJ Логи</h2>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button onClick={load} style={{display:'flex',alignItems:'center',gap:4,padding:'6px 12px',borderRadius:8,fontSize:12,background:'#1f1f1f',color:'#888',border:'1px solid #222'}}><I.Refresh/> Обновить</button>
              <label style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#666',cursor:'pointer'}}>
                <input type="checkbox" checked={autoRefresh} onChange={e=>setAutoRefresh(e.target.checked)} style={{accentColor:'#f97316'}} />
                Auto
              </label>
            </div>
          </div>
          <div className="mono" style={{background:'#0a0a0a',border:'1px solid #1a1a1a',borderRadius:12,padding:16,fontSize:11,lineHeight:1.8,maxHeight:600,overflowY:'auto'}}>
            {logs.length===0 && <div style={{color:'#444',textAlign:'center'}}>Нет логов</div>}
            {[...logs].reverse().map((line,i)=>(
              <div key={i} style={{color:colorize(line),padding:'2px 8px',borderRadius:4}}>{line}</div>
            ))}
          </div>
        </div>
      );
    }

    // ========================================================================
    // APP
    // ========================================================================
    function App() {
      const [authed, setAuthed] = useState(!!API_TOKEN);
      const [page, setPage] = useState("dashboard");
      const [checking, setChecking] = useState(true);

      useEffect(()=>{
        if(API_TOKEN) {
          api("/status").then(()=>{setAuthed(true);setChecking(false)}).catch(()=>{setAuthed(false);setChecking(false);localStorage.removeItem("radio_admin_token");API_TOKEN="";});
        } else { setChecking(false); }
      },[]);

      if(checking) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',color:'#555'}}>Проверка...</div>;
      if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

      return (
        <div style={{minHeight:'100vh'}}>
          <header style={{padding:'16px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid #151515'}}>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:36,height:36,borderRadius:8,background:'linear-gradient(135deg,#f97316,#c2410c)',display:'flex',alignItems:'center',justifyContent:'center'}}><I.Radio/></div>
              <div>
                <div style={{fontWeight:700,fontSize:15,color:'#fafafa'}}>LOCAL FARTS</div>
                <div style={{fontSize:11,color:'#555'}}>Radio Admin</div>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 12px',borderRadius:8,background:'#22c55e15',border:'1px solid #22c55e33'}}>
                <StatusDot active={true}/><span style={{fontSize:12,fontWeight:500,color:'#22c55e'}}>ONLINE</span>
              </div>
              <button onClick={()=>{localStorage.removeItem("radio_admin_token");API_TOKEN="";setAuthed(false)}}
                style={{padding:'6px 12px',borderRadius:8,fontSize:12,background:'#1f1f1f',color:'#666',border:'1px solid #222'}}>Выйти</button>
            </div>
          </header>
          <div style={{padding:'16px 20px 0'}}><Nav active={page} onChange={setPage}/></div>
          <main style={{padding:20,maxWidth:1024}}>
            {page==="dashboard" && <Dashboard/>}
            {page==="djs" && <DJs/>}
            {page==="library" && <Library/>}
            {page==="history" && <History/>}
            {page==="logs" && <Logs/>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
