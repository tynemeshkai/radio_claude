# ==============================================================================
# SECURITY HEADERS — include this in every location{} that defines add_header.
#
# nginx add_header inheritance rule: if a location block defines ANY add_header
# directive, ALL add_header from parent scopes (server{}, http{}) are silently
# dropped for that location. This snippet must be included in every such block
# to restore the security headers.
#
# Usage: add  include /etc/nginx/snippets/security_headers.conf;
#        as the FIRST line inside every location{} that uses add_header.
# ==============================================================================

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                                                                                                                          always;
add_header X-Content-Type-Options    "nosniff"                                                                                                                                                       always;
add_header X-Frame-Options           "SAMEORIGIN"                                                                                                                                                    always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                              always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"                                                                                                                      always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; media-src 'self' blob:; connect-src 'self' https: wss:; font-src 'self'; worker-src blob:;" always;
