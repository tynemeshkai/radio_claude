# ==============================================================================
# SECURITY HEADERS (ADMIN PANEL variant) — use in /panel/ location only.
#
# Relaxed CSP vs the main security_headers.conf:
#   - script-src allows cdnjs.cloudflare.com (React, ReactDOM, Babel)
#   - script-src allows 'unsafe-inline' (Babel injects compiled JSX as inline <script>)
#   - script-src allows 'unsafe-eval'   (Babel internally uses eval/new Function)
#   - style-src  allows fonts.googleapis.com
#   - font-src   allows fonts.googleapis.com + fonts.gstatic.com
# ==============================================================================

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"                                                                                                                                          always;
add_header X-Content-Type-Options    "nosniff"                                                                                                                                                                       always;
add_header X-Frame-Options           "SAMEORIGIN"                                                                                                                                                                    always;
add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                                                                              always;
add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"                                                                                                                                      always;
add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; connect-src 'self' https: wss:; font-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; worker-src blob:;" always;
