user www-data;
worker_processes auto;

# Allow nginx workers to open up to 65535 file descriptors / sockets
worker_rlimit_nofile 65535;

pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;
include /etc/nginx/modules-enabled/*.conf;

events {
    # Up to 8192 simultaneous connections per worker process
    worker_connections 8192;

    # Accept all pending connections at once instead of one-by-one
    multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    aio             threads;

    keepalive_timeout   65;
    types_hash_max_size 2048;
    server_tokens       off;

    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols            TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Shared session cache — avoids full handshake for returning clients (~100ms saved)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;   # disable tickets for strict PFS

    ##
    # Logging
    ##
    access_log /var/log/nginx/access.log;

    ##
    # Gzip Settings
    ##
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 6;
    gzip_min_length 512;    # compress small payloads too (e.g. m3u8 playlists ~300B)
    gzip_proxied    any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/vnd.apple.mpegurl;

    ##
    # Open File Cache — reduces stat()/open() syscalls for static files and HLS from /dev/shm
    ##
    open_file_cache          max=1000 inactive=20s;
    open_file_cache_valid    30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   off;  # don't cache 404s — HLS segments are created/deleted rapidly

    ##
    # Rate and Connection Limits
    ##
    limit_req_zone  $binary_remote_addr zone=one:10m   rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=perip:10m;

    ##
    # Proxy Cache
    ##
    proxy_cache_path /var/cache/nginx/icecast_stat
        levels=1:2
        keys_zone=icecast_stat_cache:10m
        max_size=50m
        inactive=60m
        use_temp_path=off;

    ##
    # WebSocket upgrade map
    # Allows correct Connection header for both WebSocket upgrades and plain HTTP
    ##
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       close;
    }

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
